<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Google</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f4f9; }
        .login-container { background: #ffffff; padding: 40px; border-radius: 8px; width: 400px; border: 1px solid #dadce0; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }
        h2 { font-size: 24px; color: #202124; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dadce0; border-radius: 4px; }
        .links { display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 14px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; float: left; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
    <h2>تسجيل الدخول</h2>
    
    <!-- عند الضغط على الزر، يتم تنفيذ دالة JavaScript -->
    <form id="loginForm">
        <input type="text" placeholder="البريد الإلكتروني أو الهاتف" required>
        <input type="password" placeholder="كلمة المرور" required>
        
        <div class="links">
            <a href="#">إنشاء حساب</a>
            <a href="#">هل نسيت كلمة المرور؟</a>
        </div>
        <button type="submit">التالي</button>
    </form>
</div>

<script>
    // عند إرسال النموذج، قم بالتحويل إلى موقع جوجل
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); // منع إعادة تحميل الصفحة
        window.location.href = "https://www.google.com"; // الانتقال لـ جوجل
    });

    // معلومات فايرباز (للشكل فقط)
    const firebaseConfig = {
        apiKey: "ex-AIzaSyA1...",
        authDomain: "ex-project.firebaseapp.com",
        projectId: "ex-project-id",
        storageBucket: "ex-project.appspot.com",
        messagingSenderId: "ex-123456789",
        appId: "ex-1:1234:web:abcd"
    };
</script>

</body>
</html>
